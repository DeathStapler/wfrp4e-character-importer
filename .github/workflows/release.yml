name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build module.zip
        run: |
          mkdir -p build
          cp -r module.json src styles README.md build/
          cd build
          zip -r ../module.zip .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            module.json
