name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DOWNLOAD="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/module.zip"
          jq --arg version "$VERSION" --arg download "$DOWNLOAD" \
            '.version = $version | .download = $download' module.json > module.json.tmp
          mv module.json.tmp module.json
          echo "module.json version set to $VERSION"

      - name: Build module.zip
        run: |
          mkdir -p build
          cp -r module.json src styles README.md LICENSE build/
          cd build
          zip -r ../module.zip .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            module.json
